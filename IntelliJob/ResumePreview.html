<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Resume Preview</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/dreampulse/computer-modern-web-font@master/fonts.css');

        @page {
            size: letter;
            margin: 0.6in 0.6in 0.6in 0.6in;
        }

        html, body {
            margin: 0;
            padding: 0;
            background: #e9e9e9;
            font-family: "Computer Modern", "Latin Modern Roman", Georgia, serif;
            color: #111111;
        }

        .shell {
            padding: 24px 16px 40px;
        }

        .paper {
            max-width: 780px;
            margin: 0 auto;
            background: #ffffff;
            box-shadow: 0 12px 30px rgba(0,0,0,0.10);
            padding: 36px 46px 36px;
        }

        /* ---------- HEADER ---------- */
        .r-name {
            text-align: center;
            font-size: 22pt;
            font-weight: 700;
            font-variant: small-caps;
            letter-spacing: 0.5px;
            margin: 0 0 3px;
        }

        .r-location {
            text-align: center;
            font-size: 10pt;
            margin: 0 0 4px;
            color: #111;
        }

        .r-contact {
            text-align: center;
            font-size: 10pt;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 4px 14px;
            margin: 0 0 14px;
        }

        .r-contact a,
        .r-contact span {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            color: #111;
            font-variant-numeric: lining-nums;
        }

        .r-contact a {
            text-decoration: underline;
        }

        .r-contact span {
            text-decoration: none;
        }

        .r-contact a:hover { opacity: 0.75; }

        .icon {
            width: 13px;
            height: 13px;
            object-fit: contain;
            vertical-align: middle;
            margin-right: 3px;
        }

        /* ---------- SECTIONS ---------- */
        .r-section {
            margin-bottom: 10px;
        }

        .r-section-title {
            font-size: 11pt;
            font-weight: 700;
            letter-spacing: 0.3px;
            margin: 0 0 3px;
            padding-bottom: 2px;
            border-bottom: 1.2px solid #111;
        }

        /* ---------- SUMMARY ---------- */
        .r-summary {
            font-size: 10pt;
            line-height: 1.45;
            margin: 6px 0 0;
        }

        /* ---------- SUBHEADING (education) ---------- */
        .r-subheading {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-top: 6px;
        }

        .r-subheading-left { flex: 1; }

        .r-subheading-right {
            text-align: right;
            white-space: nowrap;
            padding-left: 10px;
        }

        .r-subheading .sh-title {
            font-size: 10pt;
            font-weight: 700;
            margin: 0;
        }

        .r-subheading .sh-subtitle {
            font-size: 9.5pt;
            font-style: italic;
            margin: 0;
        }

        .r-subheading .sh-date {
            font-size: 9.5pt;
            font-weight: 700;
            margin: 0;
        }

        .r-subheading .sh-loc {
            font-size: 9.5pt;
            font-style: italic;
            margin: 0;
        }

        /* ---------- ENTRY (experience / projects) ---------- */
        .r-entry {
            margin-top: 7px;
        }

        .r-entry-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            width: 100%;
        }

        .r-entry-header .eh-title {
            font-size: 10pt;
            font-weight: 700;
            margin: 0;
            flex: 1;
        }

        .r-entry-header .eh-tech {
            font-weight: 400;
            font-style: italic;
        }

        .r-entry-header .eh-date {
            font-size: 9.5pt;
            font-weight: 700;
            white-space: nowrap;
            padding-left: 12px;
            flex-shrink: 0;
        }

        .r-entry-header .eh-subtitle {
            font-size: 9.5pt;
            font-style: italic;
            font-weight: 400;
            margin: 0;
            flex: 1;
        }

        .r-entry-header .eh-loc {
            font-size: 9.5pt;
            font-style: italic;
            white-space: nowrap;
            padding-left: 12px;
            flex-shrink: 0;
        }

        /* ---------- BULLETS ---------- */
        ul.r-bullets {
            margin: 3px 0 0 18px;
            padding: 0;
        }

        ul.r-bullets li {
            font-size: 9.5pt;
            line-height: 1.4;
            margin-bottom: 2px;
            list-style-type: disc;
        }

        /* ---------- SKILLS ---------- */
        .r-skills-table {
            margin-top: 6px;
            padding-left: 15px;
        }

        .r-skills-row {
            font-size: 10pt;
            line-height: 1.7;
        }

        .r-skills-row .sk-label {
            font-weight: 700;
        }

        /* ---------- SIMPLE LIST ---------- */
        ul.r-simple-list {
            margin: 6px 0 0 18px;
            padding: 0;
        }

        ul.r-simple-list li {
            font-size: 10pt;
            line-height: 1.4;
            margin-bottom: 3px;
        }

        /* ---------- FOOTER ---------- */
        .footer-actions {
            margin-top: 22px;
            display: flex;
            justify-content: center;
        }

        .download-btn {
            border: 1px solid #111;
            background: #111;
            color: #fff;
            font-family: inherit;
            font-size: 11pt;
            font-weight: 700;
            padding: 10px 22px;
            cursor: pointer;
        }

        .download-btn:hover { opacity: 0.88; }

        .error-box {
            max-width: 780px;
            margin: 42px auto;
            background: #fff6f6;
            border: 1px solid #f0c8c8;
            color: #8a1e1e;
            padding: 18px 20px;
            font-size: 11pt;
        }

        @media print {
            html, body { background: #fff; }
            .shell { padding: 0; }
            .paper {
                max-width: none;
                margin: 0;
                box-shadow: none;
                padding: 0;
            }
            .footer-actions { display: none; }
        }
    </style>
</head>
<body>
<div class="shell">
    <div class="paper">
        <div id="resumeContent"></div>
        <div class="footer-actions">
            <button type="button" class="download-btn" onclick="window.print()">Download PDF</button>
        </div>
    </div>
</div>

<script src="resume.js"></script>
<script>
    var ICONS = {
        phone:    "assets/img/resume-icons/phone_icon.png",
        email:    "assets/img/resume-icons/email_icon.png",
        linkedin: "assets/img/resume-icons/linkedin_icon.png",
        github:   "assets/img/resume-icons/github_icon.png",
        location: "assets/img/resume-icons/location_icon.png"
    };

    /* ---------- HELPERS ---------- */
    function parsePayload() {
        var hash = window.location.hash || '';
        if (!hash || hash.length < 2) return null;
        var fragment = hash.substring(1);
        if (fragment.indexOf('data=') === 0) fragment = fragment.substring(5);
        if (!fragment) return null;
        try { return JSON.parse(decodeURIComponent(fragment)); }
        catch (e) { return null; }
    }

    function esc(v) {
        return String(v == null ? '' : v)
            .replace(/&/g,'&amp;').replace(/</g,'&lt;')
            .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    function img(type) {
        return '<img src="' + ICONS[type] + '" class="icon" alt="" />';
    }

    function stripBold(str) {
    return esc(String(str || ''))
        .replace(/\*(.+?)\*/g, '<strong>$1</strong>')
        .replace(/_(.+?)_/g, '<em>$1</em>');
}

    function resolveDoc(payload) {
        if (!payload) return null;
        if (payload.enhancedResumeDocument && typeof payload.enhancedResumeDocument === 'object')
            return payload.enhancedResumeDocument;
        return payload;
    }

    function section(title, inner) {
        return '<div class="r-section"><div class="r-section-title">' + title + '</div>' + inner + '</div>';
    }

    function formatDate(month, year, isCurrent) {
        if (isCurrent) return 'Present';
        if (!year) return '';
        var months = ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        return month ? months[month] + ' ' + year : String(year);
    }

    /* ---------- RENDER ---------- */
    function renderResume(payload) {
        var doc  = resolveDoc(payload);
        var root = document.getElementById('resumeContent');

        if (!doc) {
            root.innerHTML = '<div class="error-box">No resume data found.</div>';
            return;
        }

        var p    = doc.personalInfo || {};
        var html = '';

        /* --- HEADER --- */
        html += '<div class="r-name">' + esc(p.fullName || '') + '</div>';

        if (p.address || p.country) {
            var loc = [p.address, p.country].filter(Boolean).join(', ');
            html += '<div class="r-location">' + img('location') + ' ' + esc(loc) + '</div>';
        }

        var contacts = [];
        if (p.mobile)
            contacts.push('<span>' + img('phone') + ' ' + esc(p.mobile) + '</span>');
        if (p.email)
            contacts.push('<a href="mailto:' + esc(p.email) + '">' + img('email') + esc(p.email) + '</a>');
        if (p.linkedinUrl)
            contacts.push('<a href="' + esc(p.linkedinUrl) + '" target="_blank">'
                + img('linkedin')
                + esc(p.linkedinUrl.replace('https://www.','').replace('https://',''))
                + '</a>');
        if (p.portfolioUrl)
            contacts.push('<a href="' + esc(p.portfolioUrl) + '" target="_blank">'
                + img('github')
                + esc(p.portfolioUrl.replace('https://',''))
                + '</a>');
        html += '<div class="r-contact">' + contacts.join('') + '</div>';

        /* --- SUMMARY --- */
        if (doc.professionalSummary) {
            html += section('Professional Summary',
                '<p class="r-summary">' + stripBold(doc.professionalSummary) + '</p>');
        }

        /* --- EDUCATION --- */
        if (doc.education && doc.education.length) {
            var eduHtml = '';
            for (var i = 0; i < doc.education.length; i++) {
                var e        = doc.education[i];
                var startStr = formatDate(e.startMonth, e.startYear, false);
                var endStr   = formatDate(e.endMonth,   e.endYear,   e.isCurrent);
                var dateStr  = startStr && endStr ? startStr + ' - ' + endStr : (startStr || endStr);

                eduHtml += '<div class="r-subheading">';
                eduHtml +=   '<div class="r-subheading-left">';
                eduHtml +=     '<p class="sh-title">'    + stripBold(e.schoolName || '') + '</p>';
                if (e.degree)
                    eduHtml += '<p class="sh-subtitle">' + stripBold(e.degree) + '</p>';
                eduHtml +=   '</div>';
                eduHtml +=   '<div class="r-subheading-right">';
                if (dateStr)    eduHtml += '<p class="sh-date">' + esc(dateStr)    + '</p>';
                if (e.location) eduHtml += '<p class="sh-loc">'  + esc(e.location) + '</p>';
                eduHtml +=   '</div>';
                eduHtml += '</div>';
            }
            html += section('Education', eduHtml);
        }

        /* --- EXPERIENCE --- */
        if (doc.experience && doc.experience.length) {
            var expHtml = '';
            for (var i = 0; i < doc.experience.length; i++) {
                var ex       = doc.experience[i];
                var startStr = formatDate(ex.startMonth, ex.startYear, false);
                var endStr   = formatDate(ex.endMonth,   ex.endYear,   ex.isCurrent);
                var dateStr  = startStr && endStr ? startStr + ' - ' + endStr : (startStr || endStr);

                expHtml += '<div class="r-entry">';

                /* row 1: bold job title left, bold date right */
                expHtml +=   '<div class="r-entry-header">';
                expHtml +=     '<p class="eh-title">' + stripBold(ex.jobTitle || '') + '</p>';
                if (dateStr) expHtml += '<span class="eh-date">' + esc(dateStr) + '</span>';
                expHtml +=   '</div>';

                /* row 2: italic company left, italic location right */
                expHtml +=   '<div class="r-entry-header">';
                expHtml +=     '<p class="eh-subtitle">' + stripBold(ex.company || '') + '</p>';
                if (ex.location) expHtml += '<span class="eh-loc">' + esc(ex.location) + '</span>';
                expHtml +=   '</div>';

                if (ex.bullets && ex.bullets.length) {
                    expHtml += '<ul class="r-bullets">';
                    for (var b = 0; b < ex.bullets.length; b++) {
                        expHtml += '<li>' + stripBold(ex.bullets[b]) + '</li>';
                    }
                    expHtml += '</ul>';
                }
                expHtml += '</div>';
            }
            html += section('Experience', expHtml);
        }

        /* --- PROJECTS --- */
        if (doc.projects && doc.projects.length) {
            var projHtml = '';
            for (var i = 0; i < doc.projects.length; i++) {
                var pr   = doc.projects[i];
                var tech = Array.isArray(pr.techStack) ? pr.techStack.join(', ') : (pr.techStack || '');

                projHtml += '<div class="r-entry">';
                projHtml +=   '<div class="r-entry-header">';
                projHtml +=     '<p class="eh-title">' + stripBold(pr.projectTitle || '');
                if (tech) projHtml += ' <span class="eh-tech">| ' + esc(tech) + '</span>';
                projHtml +=     '</p>';
                if (pr.date) projHtml += '<span class="eh-date">' + esc(pr.date) + '</span>';
                projHtml +=   '</div>';

                if (pr.bullets && pr.bullets.length) {
                    projHtml += '<ul class="r-bullets">';
                    for (var b = 0; b < pr.bullets.length; b++) {
                        projHtml += '<li>' + stripBold(pr.bullets[b]) + '</li>';
                    }
                    projHtml += '</ul>';
                } else if (pr.description) {
                    projHtml += '<ul class="r-bullets"><li>' + stripBold(pr.description) + '</li></ul>';
                }
                projHtml += '</div>';
            }
            html += section('Projects', projHtml);
        }

        /* --- TECHNICAL SKILLS --- */
        if (doc.skills && typeof doc.skills === 'object') {
            var sk     = doc.skills;
            var skHtml = '<div class="r-skills-table">';

            var skMap = [
                { label: 'Programming Languages',   key: 'programmingLanguages'  },
                { label: 'Frameworks & Libraries',  key: 'frameworksLibraries'   },
                { label: 'Tools, Cloud & Database', key: 'toolsCloudDatabase'    },
                { label: 'Languages',               key: 'softSkillsLanguages'   }
            ];

            for (var i = 0; i < skMap.length; i++) {
                var arr = sk[skMap[i].key];
                if (arr && arr.length) {
                    skHtml += '<div class="r-skills-row"><span class="sk-label">'
                        + esc(skMap[i].label) + ': </span>'
                        + esc(arr.join(', '))
                        + '</div>';
                }
            }

            if (sk.customSection && sk.customSection.heading && sk.customSection.items && sk.customSection.items.length) {
                skHtml += '<div class="r-skills-row"><span class="sk-label">'
                    + esc(sk.customSection.heading) + ': </span>'
                    + esc(sk.customSection.items.join(', '))
                    + '</div>';
            }

            skHtml += '</div>';
            html += section('Technical Skills', skHtml);
        }

        root.innerHTML = html;
    }

    document.addEventListener('DOMContentLoaded', function () {
        var payload = parsePayload();
        if (!payload && typeof window.sampleResumePayload !== 'undefined') {
            payload = window.sampleResumePayload;
        }
        renderResume(payload);
    });
</script>
</body>
</html>
